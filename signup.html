<!DOCTYPE html>
<html>

<head>
    <title>NutriGuide | Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/nutrinest.png') }}" type="image/x-icon">
</head>

<body>

    <div class="container">
        <h2>Sign Up</h2>

        <form action="/submit" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <input type="text" name="age" placeholder="Your Age" required>
            <input type="text" name="height" placeholder="Your Height" required>
            <input type="text" name="weight" placeholder="Your Weight" required>

            <button type="submit">Sign Up</button>
        </form>
    </div>

</body>
</html>
